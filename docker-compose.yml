services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamcp
      POSTGRES_PASSWORD: teamcp
      POSTGRES_DB: teamcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://teamcp:teamcp@postgres:5432/teamcp?schema=public"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
    depends_on:
      - postgres

volumes:
  pgdata:
