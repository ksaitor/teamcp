name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/ksaitor/teamcp/blob/main/CLA.md"
          # Signatures can't live on main: it's protected, so the action's
          # commit gets rejected. It creates this branch on first signature.
          branch: "cla-signatures"
          allowlist: "ksaitor,bot*,dependabot[bot]"
          custom-notsigned-prcomment: >
            Thank you for your contribution to Teamcp! Before we can merge this,
            we ask you to sign our [Contributor License Agreement](https://github.com/ksaitor/teamcp/blob/main/CLA.md).
            You keep ownership of your code — the CLA grants us the license needed
            to keep the project sustainable. You can sign by posting the comment below.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA ✅"
          lock-pullrequest-aftermerge: false
